<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kenneth R. Turner | Experience</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>

<body data-depth="0">

<header class="banner" role="banner">
  <div class="container banner-inner" id="banner-inner"></div>
  <div class="banner-divider" aria-hidden="true"></div>
</header>

<main>
  <section class="section">
    <div class="container">
      <h2>Selected Enterprise Projects</h2>
      <p>A selection of platforms I have owned and delivered, each focused on
         improving how leadership makes decisions around application investment,
         modernization, and risk.</p>
      <div class="card-grid" id="project-cards"></div>
    </div>
  </section>
</main>

<div class="role-intent" id="role-intent"></div>
<footer class="site-footer" role="contentinfo" id="site-footer"></footer>

<script src="/js/portfolio.js"></script>
<script>
  (async () => {
    const d = await Portfolio.loadData();
    document.getElementById('banner-inner').innerHTML = Portfolio.buildNav(d, 'projects.html');
    document.getElementById('site-footer').innerHTML  = Portfolio.buildFooter(d);
    document.getElementById('role-intent').textContent = d.meta.tagline;
    document.getElementById('project-cards').innerHTML =
      Portfolio.buildProjectCards(d.enterpriseProjects);
    Portfolio.initNavToggle();
    Portfolio.setYear();
  })();
</script>

</body>
</html>
