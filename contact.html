<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kenneth R. Turner | Contact</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body data-depth="0">

<header class="banner" role="banner">
  <div class="container banner-inner" id="banner-inner"></div>
  <div class="banner-divider" aria-hidden="true"></div>
</header>

<main>
  <section class="section">
    <div class="container" style="max-width:800px;">
      <div class="page-title-container">
        <h2 class="page-title">Contact Me</h2>
      </div>
      <p style="text-align:center;margin-bottom:32px;">
        I welcome professional inquiries. Connect via email or LinkedIn to discuss
        opportunities, collaborations, or enterprise AI product innovation.
      </p>
      <div class="card-grid" style="grid-template-columns:repeat(auto-fit,minmax(240px,1fr));">

        <div class="card contact-card">
          <i class="fa-solid fa-envelope" style="color:var(--primary);"></i>
          <h3>Email</h3>
          <p><a id="contact-email" href="#">—</a></p>
        </div>

        <div class="card contact-card">
          <i class="fa-brands fa-linkedin" style="color:#0077B5;"></i>
          <h3>LinkedIn</h3>
          <p><a id="contact-linkedin" href="#" target="_blank" rel="noopener noreferrer">linkedin.com/in/kennethrturner</a></p>
        </div>

      </div>
    </div>
  </section>
</main>

<div class="role-intent" id="role-intent"></div>
<footer class="site-footer" role="contentinfo" id="site-footer"></footer>

<script src="/js/portfolio.js"></script>
<script>
  (async () => {
    const d = await Portfolio.loadData();
    document.getElementById('banner-inner').innerHTML  = Portfolio.buildNav(d, 'contact.html');
    document.getElementById('site-footer').innerHTML   = Portfolio.buildFooter(d);
    document.getElementById('role-intent').textContent = d.meta.tagline;

    const emailEl = document.getElementById('contact-email');
    emailEl.href        = `mailto:${d.meta.email}`;
    emailEl.textContent = d.meta.email;

    const liEl = document.getElementById('contact-linkedin');
    liEl.href = d.meta.linkedin;

    Portfolio.initNavToggle();
    Portfolio.setYear();
  })();
</script>

</body>
</html>
