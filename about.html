<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kenneth R. Turner | Background</title>
  <link rel="stylesheet" href="/css/style.css" />
<!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-3EG813QJ4B"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-3EG813QJ4B');
  </script>
</head>

<body data-depth="0">

<header class="banner" role="banner">
  <div class="container banner-inner" id="banner-inner"></div>
  <div class="banner-divider" aria-hidden="true"></div>
</header>

<main>
  <section class="section">
    <div class="container">
      <div class="page-title-container">
        <h2 class="page-title">About Me</h2>
      </div>
      <p class="about-intro" id="about-intro"></p>
      <div class="cards-container" id="about-cards"></div>
    </div>
  </section>
</main>

<div class="role-intent" id="role-intent"></div>
<footer class="site-footer" role="contentinfo" id="site-footer"></footer>

<script src="/js/portfolio.js"></script>
<script>
  (async () => {
    const d = await Portfolio.loadData();
    document.getElementById('banner-inner').innerHTML  = Portfolio.buildNav(d, 'about.html');
    document.getElementById('site-footer').innerHTML   = Portfolio.buildFooter(d);
    document.getElementById('role-intent').textContent = d.meta.tagline;
    document.getElementById('about-intro').innerHTML = d.about.intro;
    document.getElementById('about-cards').innerHTML   = Portfolio.buildAboutCards(d, '0');
    Portfolio.initNavToggle();
    Portfolio.setYear();
  })();
</script>

</body>
</html>
